on:
  push:

jobs:
  test:
    name: Run Bun Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.3
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test --only-failures